name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: "Build & Publish Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: "Determine version from tag"
        id: version
        run: |
          version="${{ github.event.release.tag_name }}"
          version="${version#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "Update version in manifest.json"
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" \
            '.version = $v' \
            custom_components/smart_garage/manifest.json > tmp.json
          mv tmp.json custom_components/smart_garage/manifest.json

      - name: "Commit version back to main"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/smart_garage/manifest.json
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
            git push origin main
          }

      - name: "Create release ZIP"
        run: |
          cd custom_components/smart_garage
          zip -r ../../smart_garage.zip .

      - name: "Upload release asset"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: smart_garage.zip
